name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 181.171.171.30 >> ~/.ssh/known_hosts

      - name: Run deploy script
        run: |
          ssh sysa@181.171.171.30 "cd /home/sysa && ./deploy.sh"